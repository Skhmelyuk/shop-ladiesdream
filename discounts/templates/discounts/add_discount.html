{% extends 'main/base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block head %}
<link rel="stylesheet" href="{% static 'main/discounts.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="discount-form shadow-sm p-5">
        <h2 class="text-center mb-4">🩷 Додати нову знижку</h2>

        <form method="post" class="discount-form-inner">
            {% csrf_token %}
            <div class="form-fields mb-4">
                {{ form|crispy }}
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-pink px-5 py-2">
                    💾 Зберегти знижку
                </button>
            </div>
        </form>
    </div>

    <div class="mt-4 text-center">
        <a href="{% url 'admin:index' %}" class="text-muted" style="text-decoration: none;">
            ← Повернутися до адмінки
        </a>
    </div>
</div>
{% endblock %}
