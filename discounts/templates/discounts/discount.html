{% load static %}
<link rel="stylesheet" href="{% static 'css/discounts.css' %}">

<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Форма знижки</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">

    <!-- ================== Форма знижки ================== -->
    <form class="discount-form">
        <h2>Отримати знижку</h2>
        <div class="discount-form-inner">

            <div class="form-group">
                <label for="name">Ім'я</label>
                <input type="text" id="name" placeholder="Введіть ім'я">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Введіть email">
            </div>

            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" placeholder="Введіть номер телефону">
            </div>

            <div class="form-group apply-promocode">
                <input type="text" placeholder="Введіть промокод">
                <button type="button" class="btn-pink">Застосувати</button>
            </div>

            <div class="form-group">
                <button type="submit" class="btn-pink">Отримати знижку</button>
            </div>

        </div>
    </form>

    <div class="alert-pink">
        Промокод застосовано успішно!
    </div>

    <table class="table-pink">
        <thead>
            <tr>
                <th>Промокод</th>
                <th>Знижка</th>
                <th>Статус</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>PINK10</td>
                <td>10%</td>
                <td><span class="status-dot active"></span> Активний</td>
            </tr>
            <tr>
                <td>PINK20</td>
                <td>20%</td>
                <td><span class="status-dot inactive"></span> Неактивний</td>
            </tr>
        </tbody>
    </table>

</div>
</body>
</html>
