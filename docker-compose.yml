services:
  postgres:
    image: postgres:16
    container_name: shopdj_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopdj_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shopdj_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
