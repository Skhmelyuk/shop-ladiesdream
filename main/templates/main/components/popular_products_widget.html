
<aside class="widget popular-products-widget">
    <h3>🔥 Популярні товари</h3>
    
    {% if popular_products %}
    <ul class="widget-product-list">
        {% for product in popular_products %}
        <li>
            {% if product.image %}
                <a href="{{ product.get_absolute_url }}">
                    <img src="{{ product.image.url }}" alt="{{ product.name }}">
                </a>
            {% endif %}
            <div class="product-info">
                <h4><a href="{{ product.get_absolute_url }}">{{ product.name }}</a></h4>
                <div class="price-widget">{{ product.price|currency }}</div>
            </div>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p>Наразі популярних товарів немає.</p>
    {% endif %}
</aside>
